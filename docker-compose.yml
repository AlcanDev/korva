version: "3.9"

# ── Korva Vault — servidor compartido de equipo ───────────────────────────────
#
# Uso rápido:
#   docker compose up -d
#
# Con variables de entorno personalizadas:
#   KORVA_ADMIN_KEY=tu-key docker compose up -d

services:
  vault:
    image: ghcr.io/alcandev/korva-vault:latest
    # O para build local:
    # build: .
    container_name: korva-vault
    restart: unless-stopped
    ports:
      - "${KORVA_PORT:-7437}:7437"
    volumes:
      - korva-data:/data
      # Admin key (montar tu admin.key local — NUNCA hardcodear en este archivo)
      - ${KORVA_ADMIN_KEY_PATH:-/dev/null}:/data/admin.key:ro
    environment:
      KORVA_VAULT_DB: /data/vault.db
      KORVA_VAULT_PORT: 7437
      KORVA_VAULT_MODE: http
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7437/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.korva.rule=Host(`${KORVA_DOMAIN:-vault.localhost}`)"
      - "traefik.http.routers.korva.entrypoints=websecure"
      - "traefik.http.routers.korva.tls.certresolver=letsencrypt"

  # ── Traefik (reverse proxy + HTTPS automático) ────────────────────────────
  # Descomentar si se despliega en VPS con dominio propio
  # traefik:
  #   image: traefik:v3.0
  #   container_name: traefik
  #   restart: unless-stopped
  #   command:
  #     - "--providers.docker=true"
  #     - "--entrypoints.web.address=:80"
  #     - "--entrypoints.websecure.address=:443"
  #     - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
  #     - "--certificatesresolvers.letsencrypt.acme.storage=/certs/acme.json"
  #     - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #     - traefik-certs:/certs

volumes:
  korva-data:
    driver: local
  # traefik-certs:
  #   driver: local
