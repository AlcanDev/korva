version: "3.9"

# ── Korva — stack completo para equipo ───────────────────────────────────────
#
# Local (single host, no proxy):
#   docker compose up -d vault
#
# Production (Coolify / VPS with Traefik):
#   Set KORVA_APP_DOMAIN, KORVA_API_DOMAIN, KORVA_MCP_DOMAIN and the
#   matching CORS / OIDC / email vars in your .env, then deploy. See
#   docs/DEPLOY_COOLIFY.md for the full walkthrough.
#
# Required env in production:
#   KORVA_APP_DOMAIN              — e.g. app.korva.dev
#   KORVA_API_DOMAIN              — e.g. api.korva.dev
#   KORVA_MCP_DOMAIN              — e.g. mcp.korva.dev
#   KORVA_CORS_ORIGIN             — usually https://${KORVA_APP_DOMAIN}
#   KORVA_OIDC_*                  — when enabling SSO
#   KORVA_EMAIL_API_KEY / _FROM   — when enabling Resend

services:

  # ── Vault (memoria compartida del equipo) ─────────────────────────────────
  vault:
    # Default: build from the repo Dockerfile so cloned checkouts and Coolify
    # deploys work without registry credentials. Set `image:` (and comment
    # `build:`) when you publish to GHCR and want to skip the build step.
    build:
      context: .
      args:
        # Pass-through for explicit version metadata. Coolify exposes
        # COOLIFY_COMMIT_SHA on every deploy; CI passes KORVA_VERSION;
        # local builds leave both empty and the Dockerfile falls back
        # to `git describe`. Compose's variable parser rejects nested
        # defaults like ${A:-${B:-}}, so we keep each value flat.
        VERSION: "${KORVA_VERSION:-}"
        COMMIT: "${COOLIFY_COMMIT_SHA:-}"
        BUILD_DATE: "${KORVA_BUILD_DATE:-}"
    # image: ghcr.io/alcandev/korva-vault:latest
    container_name: korva-vault
    restart: unless-stopped
    ports:
      - "${KORVA_PORT:-7437}:7437"
    volumes:
      - korva-data:/data
      # Admin key — monta tu admin.key local; NUNCA hardcodear en este archivo
      - ${KORVA_ADMIN_KEY_PATH:-/dev/null}:/data/admin.key:ro
    environment:
      KORVA_VAULT_DB: /data/vault.db
      KORVA_VAULT_PORT: 7437
      KORVA_VAULT_HOST: 0.0.0.0
      KORVA_VAULT_MODE: http
      # CORS origin for Beacon — set to the public app URL in production.
      # Local dev defaults to http://localhost:5173 inside the binary.
      KORVA_CORS_ORIGIN:          "${KORVA_CORS_ORIGIN:-}"
      # MCP HTTP transport. Default-deny: requests without a valid bearer
      # are rejected with 401. Set to "true" only for local development.
      KORVA_MCP_ALLOW_ANONYMOUS:  "${KORVA_MCP_ALLOW_ANONYMOUS:-false}"
      # ── OIDC / SSO (Phase 15.D) ────────────────────────────────────────
      # Leave the four required vars empty to keep OIDC disabled. Set all
      # four to enable /auth/oidc/login + /auth/oidc/callback.
      # In production the redirect URL must be:
      #   https://${KORVA_API_DOMAIN}/auth/oidc/callback
      # See docs/SELF_HOSTING_OIDC.md for IdP-specific setup recipes
      # (Okta, Azure AD, Google Workspace, Authentik, Keycloak).
      KORVA_OIDC_ISSUER_URL:      "${KORVA_OIDC_ISSUER_URL:-}"
      KORVA_OIDC_CLIENT_ID:       "${KORVA_OIDC_CLIENT_ID:-}"
      KORVA_OIDC_CLIENT_SECRET:   "${KORVA_OIDC_CLIENT_SECRET:-}"
      KORVA_OIDC_REDIRECT_URL:    "${KORVA_OIDC_REDIRECT_URL:-}"
      # Optional — comma-separated email-domain allowlist (e.g.
      # "acme.io,partner.dev"). Empty = no domain filter.
      KORVA_OIDC_ALLOWED_DOMAINS: "${KORVA_OIDC_ALLOWED_DOMAINS:-}"
      # Optional — override the default scope list (openid,email,profile).
      KORVA_OIDC_SCOPES:          "${KORVA_OIDC_SCOPES:-}"
      # ── Email (Resend) ─────────────────────────────────────────────────
      # In production: KORVA_EMAIL_FROM should live on a subdomain like
      # send.korva.dev so its SPF/DKIM don't conflict with the apex domain's
      # marketing sender.
      KORVA_EMAIL_API_KEY:        "${KORVA_EMAIL_API_KEY:-}"
      KORVA_EMAIL_FROM:           "${KORVA_EMAIL_FROM:-}"
      KORVA_EMAIL_FROM_NAME:      "${KORVA_EMAIL_FROM_NAME:-Korva}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7437/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      # Three subdomains, one backend. Host-based routing — no path rewriting
      # needed because the vault's internal mux already handles /healthz,
      # /v1/*, /api/v1/*, /vault-api/*, /mcp and the SPA fallback.
      - "traefik.enable=true"
      - "traefik.http.services.korva-vault.loadbalancer.server.port=7437"

      # app.korva.dev — Beacon dashboard (also proxies /vault-api back to itself)
      - "traefik.http.routers.korva-app.rule=Host(`${KORVA_APP_DOMAIN:-app.localhost}`)"
      - "traefik.http.routers.korva-app.entrypoints=websecure"
      - "traefik.http.routers.korva-app.tls.certresolver=letsencrypt"
      - "traefik.http.routers.korva-app.service=korva-vault"

      # api.korva.dev — REST API for CLI and third parties
      - "traefik.http.routers.korva-api.rule=Host(`${KORVA_API_DOMAIN:-api.localhost}`)"
      - "traefik.http.routers.korva-api.entrypoints=websecure"
      - "traefik.http.routers.korva-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.korva-api.service=korva-vault"

      # mcp.korva.dev — Streamable HTTP MCP endpoint for editors
      - "traefik.http.routers.korva-mcp.rule=Host(`${KORVA_MCP_DOMAIN:-mcp.localhost}`)"
      - "traefik.http.routers.korva-mcp.entrypoints=websecure"
      - "traefik.http.routers.korva-mcp.tls.certresolver=letsencrypt"
      - "traefik.http.routers.korva-mcp.service=korva-vault"

  # ── Licensing server (Korva for Teams) ────────────────────────────────────
  # Solo necesario para operadores que venden licencias Korva for Teams.
  # Clientes individuales NO necesitan este servicio.
  licensing:
    image: ghcr.io/alcandev/korva-licensing:latest
    # Para build local (desde la raíz del repo):
    # build:
    #   context: .
    #   dockerfile: forge/licensing-server/Dockerfile
    container_name: korva-licensing
    restart: unless-stopped
    ports:
      - "${KORVA_LICENSING_PORT:-7440}:7440"
    volumes:
      - licensing-data:/data
    environment:
      KORVA_LICENSING_PORT: 7440
      KORVA_LICENSING_DB: /data/licensing.db
      # Secreto para el endpoint admin /v1/issue — CAMBIAR EN PRODUCCIÓN
      KORVA_LICENSING_ADMIN_SECRET: "${KORVA_LICENSING_SECRET:?KORVA_LICENSING_SECRET is required}"
      # Clave privada RSA-4096 (generada con: make keygen)
      # Opción A — inline como variable de entorno:
      KORVA_LICENSING_PRIVATE_KEY_PEM: "${KORVA_LICENSING_KEY_PEM:-}"
      # Opción B — mount del archivo (descomentar si prefieres archivo):
      # KORVA_LICENSING_PRIVATE_KEY_FILE: /run/secrets/licensing_key
    # secrets:
    #   - licensing_key
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7440/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - teams  # docker compose --profile teams up -d

  # ── Traefik (reverse proxy + HTTPS automático) ────────────────────────────
  # Descomentar para despliegue en VPS con dominio propio
  # traefik:
  #   image: traefik:v3.0
  #   container_name: traefik
  #   restart: unless-stopped
  #   command:
  #     - "--providers.docker=true"
  #     - "--entrypoints.web.address=:80"
  #     - "--entrypoints.websecure.address=:443"
  #     - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
  #     - "--certificatesresolvers.letsencrypt.acme.storage=/certs/acme.json"
  #     - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #     - traefik-certs:/certs

volumes:
  korva-data:
    driver: local
  licensing-data:
    driver: local
  # traefik-certs:
  #   driver: local

