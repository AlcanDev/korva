# Phase 15.A — drop-in GitLab CI snippet that runs `korva harness check`
# on every merge request and posts the backlog summary as a discussion
# note. Materialized by `korva harness ci install --provider=gitlab-ci`.
#
# Usage in your project:
#   include:
#     - local: .gitlab-ci.harness.yml
#
# Or merge the `harness:check` job directly into your existing
# `.gitlab-ci.yml`. The job runs on `merge_request_event`s only — feature
# branches that aren't open as MRs skip the gate (keeps CI minutes
# cheap on dev branches).

variables:
  # Pin to a release tag in production. `latest` follows main.
  KORVA_VERSION: latest

harness:check:
  stage: test
  image: alpine:3.21
  rules:
    # Trigger only on merge request events that touch harness files.
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - feature_list.json
        - specs/**/*
        - progress/**/*
        - docs/architecture.md
        - docs/conventions.md
        - docs/verification.md
        - AGENTS.md
        - CHECKPOINTS.md
        - init.sh
  before_script:
    # Alpine ships musl; korva binaries are statically linked so this works.
    - apk add --no-cache curl bash jq
    - curl -fsSL https://korva.dev/install | bash
    - export PATH="$HOME/.korva/bin:$PATH"
  script:
    - korva harness check --json | tee harness-check.json
    - |
      # Post the status summary back to the MR. Requires a project
      # access token in $KORVA_GITLAB_TOKEN (Maintainer scope, api).
      # Skips silently when the token isn't set — useful in forks
      # where the token isn't available.
      if [ -z "$KORVA_GITLAB_TOKEN" ]; then
        echo "KORVA_GITLAB_TOKEN not set — skipping MR comment."
        exit 0
      fi
      MARKER='<!-- korva-harness-status -->'
      STATUS=$(korva harness status)
      BODY=$(printf '%s\n\n## Harness status\n\n```text\n%s\n```\n' "$MARKER" "$STATUS")

      # Find an existing note with the marker so we update in place
      # rather than spam.
      API="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/notes"
      EXISTING=$(curl -fsSL --header "PRIVATE-TOKEN: ${KORVA_GITLAB_TOKEN}" "$API" \
        | jq -r ".[] | select(.body | contains(\"${MARKER}\")) | .id" | head -n1)

      if [ -n "$EXISTING" ]; then
        curl -fsSL --request PUT \
          --header "PRIVATE-TOKEN: ${KORVA_GITLAB_TOKEN}" \
          --data-urlencode "body=${BODY}" \
          "${API}/${EXISTING}" >/dev/null
      else
        curl -fsSL --request POST \
          --header "PRIVATE-TOKEN: ${KORVA_GITLAB_TOKEN}" \
          --data-urlencode "body=${BODY}" \
          "$API" >/dev/null
      fi
  artifacts:
    when: always
    paths:
      - harness-check.json
    expire_in: 1 week
