# golangci-lint v2 config (https://golangci-lint.run/usage/configuration/)
version: "2"

run:
  timeout: 5m

linters:
  default: none
  # Only the linters that add real value without noise.
  # Note: gosimple was merged into staticcheck in v2; gofmt + goimports moved
  # to the separate `formatters` section below.
  enable:
    - errcheck      # unchecked error returns
    - govet         # go vet — reports suspicious constructs
    - ineffassign   # assignments that are never used
    - staticcheck   # SA/ST/QF rules (incl. simplification, was gosimple)
    - unused        # unused code (exported + unexported)
    - misspell      # common spelling mistakes in comments/strings
    - unconvert     # unnecessary type conversions
    - bodyclose     # HTTP response body left unclosed
    - nilerr        # returns nil instead of the error it just checked

  settings:
    misspell:
      locale: US
    errcheck:
      # Idiomatic Go patterns where the error is intentionally ignored.
      # These mirror conventions used across the standard library.
      exclude-functions:
        - (io.Closer).Close
        - (*database/sql.Rows).Close
        - (*database/sql.Stmt).Close
        - (*os.File).Close
        - (*compress/gzip.Writer).Close
        - compress/gzip.(*Writer).Close
        - (*net/http.Response).Body.Close
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (*encoding/json.Decoder).Decode
        - encoding/json.Unmarshal
        - os.Remove
        - os.RemoveAll
        - os.WriteFile
        - (*github.com/spf13/cobra.Command).MarkFlagRequired

  exclusions:
    rules:
      # Test files — relax errcheck + unused (many test helpers and fixtures
      # are unused or ignore errors intentionally)
      - path: _test\.go
        linters: [errcheck, bodyclose, unused]
      # Test utilities / fixtures
      - path: testdata/
        linters: [errcheck, bodyclose, govet, staticcheck, unused, misspell, unconvert, nilerr, ineffassign]
      # Generated files
      - path: (\.pb\.go|_gen\.go|mock_.*\.go)$
        linters: [errcheck, bodyclose, govet, staticcheck, unused, misspell, unconvert, nilerr, ineffassign]

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      # Keep korva modules in their own import group
      local-prefixes:
        - github.com/alcandev/korva

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
