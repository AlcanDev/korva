version: 2

project_name: korva

# Pre-release hooks: sync workspace, generate completion scripts.
before:
  hooks:
    - go work sync
    # Generate shell completion scripts that ship inside release archives.
    - mkdir -p completions
    - sh -c "go run ./cli/cmd/korva completion bash  > completions/korva.bash"
    - sh -c "go run ./cli/cmd/korva completion zsh   > completions/korva.zsh"
    - sh -c "go run ./cli/cmd/korva completion fish  > completions/korva.fish"

builds:
  - id: korva
    main: ./cli/cmd/korva/
    binary: korva
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/alcandev/korva/internal/version.Version={{.Version}}
      - -X github.com/alcandev/korva/internal/version.Commit={{.Commit}}
      - -X github.com/alcandev/korva/internal/version.Date={{.Date}}

  - id: korva-vault
    main: ./vault/cmd/korva-vault/
    binary: korva-vault
    # embedui embeds the pre-built Beacon SPA (vault/internal/ui/dist/).
    # The release workflow copies beacon/dist/ there before goreleaser runs.
    # Local `make vault-full` does the same for development builds.
    tags:
      - embedui
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/alcandev/korva/internal/version.Version={{.Version}}
      - -X github.com/alcandev/korva/internal/version.Commit={{.Commit}}
      - -X github.com/alcandev/korva/internal/version.Date={{.Date}}

  - id: korva-sentinel
    main: ./sentinel/validator/cmd/korva-sentinel/
    binary: korva-sentinel
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/alcandev/korva/internal/version.Version={{.Version}}
      - -X github.com/alcandev/korva/internal/version.Commit={{.Commit}}
      - -X github.com/alcandev/korva/internal/version.Date={{.Date}}

archives:
  - id: korva
    ids: [korva, korva-vault, korva-sentinel]
    name_template: "korva_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - install.sh
      - install.ps1
      - completions/korva.bash
      - completions/korva.zsh
      - completions/korva.fish
      - lore/curated/**
      - sentinel/rules/**
      # NOTE: forge/ is intentionally excluded — it contains development keys
      # and mock servers that must never ship in production archives.

checksum:
  name_template: "korva_{{ .Version }}_checksums.txt"
  algorithm: sha256

signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "--local-user={{ .Env.GPG_FINGERPRINT }}"
      - "--output=${signature}"
      - "--detach-sign=${artifact}"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  use: github
  groups:
    - title: "🚀 Features"
      regexp: "^feat"
      order: 0
    - title: "🐛 Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "⚡ Performance"
      regexp: "^perf"
      order: 2
    - title: "🔒 Security"
      regexp: "^sec"
      order: 3
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge remote-tracking branch

release:
  github:
    owner: alcandev
    name: korva
  name_template: "Korva {{.Version}}"
  draft: false
  prerelease: auto
  footer: |
    ## Install

    ```bash
    curl -fsSL https://korva.dev/install | bash
    ```

    Or via Homebrew:
    ```bash
    brew install alcandev/tap/korva
    ```

    Full install docs: https://korva.dev/docs/install

brews:
  - repository:
      owner: alcandev
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    name: korva
    description: "AI ecosystem for enterprise development teams"
    homepage: "https://korva.dev"
    license: "MIT"
    commit_author:
      name: korva-bot
      email: bot@korva.dev
    install: |
      bin.install "korva"
      bin.install "korva-vault"
      bin.install "korva-sentinel"
    test: |
      system "#{bin}/korva", "--version"
