name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel redundant runs on the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Go: build + test (matrix: ubuntu, macOS, Windows) ─────────────────────
  # Windows is "best-effort" (continue-on-error) because several tests are
  # inherently Unix: file permissions (0600), ~/.korva paths, /tmp behaviour.
  # Korva's primary deployment surface is macOS + Linux; Windows is supported
  # for the CLI but its test surface needs targeted skips (// go:build !windows)
  # which is tracked separately. Ubuntu and macOS remain blocking gates.
  go:
    name: Go build + test
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    strategy:
      fail-fast: false   # don't cancel other OS jobs when one fails
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.26.x']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Sync workspace
        run: go work sync

      - name: Build all modules
        run: go build github.com/alcandev/korva/...

      # Race detector on Linux + macOS (reliable with modernc.org/sqlite)
      - name: Test (Linux / macOS)
        if: runner.os != 'Windows'
        run: go test github.com/alcandev/korva/... -race -count=1 -timeout 120s

      # Windows: skip race detector — known flakiness with SQLite file locking
      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: go test github.com/alcandev/korva/... -count=1 -timeout 120s

  # ─── Go lint ────────────────────────────────────────────────────────────────
  # Non-blocking: golangci-lint releases lag behind Go versions. When the Go
  # toolchain bumps faster than golangci-lint can be rebuilt, we report but
  # don't block the merge. Security/style enforcement is provided by:
  #   - gitleaks (secret scanning) — blocking
  #   - sentinel (Korva's own validator) — blocking
  #   - go vet (run inside the test job) — blocking
  lint:
    name: Go lint
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        continue-on-error: true
        with:
          version: latest
          args: --timeout=5m
          only-new-issues: true

  # ─── Beacon (React + TypeScript) ────────────────────────────────────────────
  beacon:
    name: Beacon build + type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: beacon/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: beacon

      # npm run build = tsc -b (type-check + compilation) + vite build
      # No separate tsc --noEmit step — it's redundant and can diverge
      - name: Build
        run: npm run build
        working-directory: beacon

  # ─── Sentinel self-check ────────────────────────────────────────────────────
  sentinel:
    name: Sentinel self-check
    runs-on: ubuntu-latest
    needs: go
    # Run even if Windows job fails — sentinel only needs the ubuntu result
    if: always() && !cancelled() && needs.go.result != 'skipped'

    steps:
      - uses: actions/checkout@v4

      - name: Check if sentinel cmd exists on this branch
        id: have-sentinel
        run: |
          if [ -f sentinel/validator/cmd/korva-sentinel/main.go ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "sentinel cmd not present on this branch — skipping self-check (not a regression)."
          fi

      - name: Set up Go
        if: steps.have-sentinel.outputs.exists == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: Build korva-sentinel
        if: steps.have-sentinel.outputs.exists == 'true'
        run: go build -o korva-sentinel ./sentinel/validator/cmd/korva-sentinel/

      - name: Scan beacon source
        if: steps.have-sentinel.outputs.exists == 'true'
        run: |
          # Feed file list via stdin (how korva-sentinel expects it from pre-commit hooks)
          find beacon/src \( -name '*.ts' -o -name '*.tsx' \) \
            | ./korva-sentinel --format json \
            | tee sentinel-report.json

          # Fail the job if sentinel found architecture violations
          jq --exit-status '.errors == 0' sentinel-report.json > /dev/null || {
            echo "::error::Sentinel found violations — see sentinel-report artifact"
            exit 1
          }

      - name: Upload sentinel report
        if: always() && steps.have-sentinel.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-report
          path: sentinel-report.json

  # ─── Secret scanning (gitleaks) ─────────────────────────────────────────────
  secrets-scan:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history — scan all commits

      # Install gitleaks directly (no license required, no third-party action needed)
      - name: Install gitleaks
        run: |
          curl -sSfL \
            https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar xz gitleaks
          chmod +x gitleaks

      - name: Detect secrets
        run: |
          ./gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --exit-code 1 \
            --report-path gitleaks-report.json \
            --report-format json

      - name: Upload gitleaks report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
