name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel redundant runs on the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Go: build + test (matrix: ubuntu, macOS, Windows) ─────────────────────
  # All three OSes are blocking gates. Windows-specific test failures have
  # been resolved at the source — POSIX-only assertions (file mode 0600)
  # now skip on Windows; ULID generation uses ulid.Monotonic to avoid
  # collisions under Windows' 16ms time resolution; cross-platform paths
  # use filepath.Base instead of hard-coded "/" prefix checks.
  go:
    name: Go build + test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # don't cancel other OS jobs when one fails
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.26.x']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Sync workspace
        run: go work sync

      - name: Build all modules
        run: go build github.com/alcandev/korva/...

      # Race detector on Linux + macOS (reliable with modernc.org/sqlite).
      # 5-minute timeout: race adds 2-10x overhead and the suite has ~250
      # tests across api+store+hive+mcp. Plenty of headroom; the gate is
      # still tight enough to catch genuine deadlocks.
      - name: Test (Linux / macOS)
        if: runner.os != 'Windows'
        run: go test github.com/alcandev/korva/... -race -count=1 -timeout 5m

      # Windows: skip race detector — known flakiness with SQLite file locking
      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: go test github.com/alcandev/korva/... -count=1 -timeout 5m

  # ─── Go lint ────────────────────────────────────────────────────────────────
  # Korva uses a Go workspace (go.work). golangci-lint can't enumerate modules
  # from the workspace root, so we matrix the lint job per module.
  # Blocking — lint failures fail CI.
  lint:
    name: Go lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [internal, vault, cli, sentinel/validator]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: golangci-lint (${{ matrix.module }})
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout=5m --config=${{ github.workspace }}/.golangci.yml
          working-directory: ${{ matrix.module }}
          only-new-issues: true

  # ─── Beacon (React + TypeScript) ────────────────────────────────────────────
  beacon:
    name: Beacon build + test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: beacon/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: beacon

      # npm run build = tsc -b (type-check + compilation) + vite build
      # No separate tsc --noEmit step — it's redundant and can diverge
      - name: Build
        run: npm run build
        working-directory: beacon

      # Vitest suite (RTL + a11y axe + helpers). Phase 14.3 added the
      # harness dashboard tests here; making them blocking prevents UI
      # regressions from sneaking through on Go-only PRs too.
      - name: Test
        run: npm test -- --run
        working-directory: beacon

      # npm audit gates on high+ vulnerabilities in production deps.
      # --omit=dev keeps build-only packages out of the gate (they don't
      # ship to users) but security advisories on runtime deps fail CI.
      - name: npm audit (production deps, high+)
        run: npm audit --omit=dev --audit-level=high
        working-directory: beacon

      # Biome check is run client-side via `npm run check` (added in this
      # PR's package.json). It is NOT gated in CI yet because the existing
      # codebase has style/format drift that needs a dedicated sweep PR.
      # Once that PR lands, add `run: npm run check` here as a blocking
      # step. Tracked separately.

  # ─── Sentinel self-check ────────────────────────────────────────────────────
  sentinel:
    name: Sentinel self-check
    runs-on: ubuntu-latest
    needs: go
    # Run even if Windows job fails — sentinel only needs the ubuntu result
    if: always() && !cancelled() && needs.go.result != 'skipped'

    steps:
      - uses: actions/checkout@v4

      - name: Check if sentinel cmd exists on this branch
        id: have-sentinel
        run: |
          if [ -f sentinel/validator/cmd/korva-sentinel/main.go ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "sentinel cmd not present on this branch — skipping self-check (not a regression)."
          fi

      - name: Set up Go
        if: steps.have-sentinel.outputs.exists == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: Build korva-sentinel
        if: steps.have-sentinel.outputs.exists == 'true'
        run: go build -o korva-sentinel ./sentinel/validator/cmd/korva-sentinel/

      - name: Scan beacon source
        if: steps.have-sentinel.outputs.exists == 'true'
        run: |
          # Feed file list via stdin (how korva-sentinel expects it from pre-commit hooks)
          find beacon/src \( -name '*.ts' -o -name '*.tsx' \) \
            | ./korva-sentinel --format json \
            | tee sentinel-report.json

          # Fail the job if sentinel found architecture violations
          jq --exit-status '.errors == 0' sentinel-report.json > /dev/null || {
            echo "::error::Sentinel found violations — see sentinel-report artifact"
            exit 1
          }

      - name: Upload sentinel report
        if: always() && steps.have-sentinel.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-report
          path: sentinel-report.json

  # ─── Go vulnerability scanning ─────────────────────────────────────────────
  # govulncheck is the official Go-team tool. It only reports CVEs whose
  # affected symbol is actually reachable from our code — fewer false
  # positives than scanning go.sum blindly. Blocking on any finding.
  govuln:
    name: Go vulnerability scan (govulncheck)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [internal, vault, cli, sentinel/validator]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Scan ${{ matrix.module }}
        working-directory: ${{ matrix.module }}
        run: govulncheck ./...

  # ─── Container image vulnerability scan (Trivy) ─────────────────────────────
  # Builds the production Dockerfile and scans the resulting image for OS +
  # library CVEs. Blocks on HIGH/CRITICAL with an available fix; warns on the
  # rest so dependabot has time to bump. Runs on PRs and main.
  container-scan:
    name: Container scan (Trivy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build vault image (load to local daemon)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: korva-vault:scan
          # Don't push, just scan locally.
          push: false
          # Cache between CI runs to keep this <2min on warm builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan (vulnerabilities, blocking on HIGH/CRITICAL with fix)
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: korva-vault:scan
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          vuln-type: os,library

      - name: Trivy scan (config + secrets, advisory)
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: korva-vault:scan
          scanners: misconfig,secret
          format: table
          exit-code: '0'  # advisory only for now; surfaces in logs

  # ─── Secret scanning (gitleaks) ─────────────────────────────────────────────
  secrets-scan:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history — scan all commits

      # Install gitleaks directly (no license required, no third-party action needed)
      - name: Install gitleaks
        run: |
          curl -sSfL \
            https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar xz gitleaks
          chmod +x gitleaks

      - name: Detect secrets
        run: |
          ./gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --exit-code 1 \
            --report-path gitleaks-report.json \
            --report-format json

      - name: Upload gitleaks report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
