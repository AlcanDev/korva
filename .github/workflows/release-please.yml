name: Release Please

# release-please tracks conventional commits since the last tag and maintains
# a "chore(release): vX.Y.Z" PR on main. Merging that PR creates the tag
# and publishes a GitHub Release. The goreleaser job below runs immediately
# after, conditioned on release_created — no separate workflow needed.
#
# Version bump rules (conventional commits):
#   feat:      → minor bump  (v1.1.0 → v1.2.0)
#   fix:       → patch bump  (v1.1.0 → v1.1.1)
#   feat!: or BREAKING CHANGE: → major bump  (v1.1.0 → v2.0.0)
#   chore/docs/ci/refactor:    → no bump (included in next release)

on:
  push:
    branches:
      - main

permissions:
  contents: write       # create tags, upload release assets, update manifest
  pull-requests: write  # open/update Release PR
  packages: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest

    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name:        ${{ steps.rp.outputs.tag_name }}

    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  goreleaser:
    name: GoReleaser
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: beacon/package-lock.json

      - name: Build Beacon (embedded UI)
        run: |
          cd beacon && npm ci && npm run build && cd ..
          mkdir -p vault/internal/ui/dist
          cp -r beacon/dist/. vault/internal/ui/dist/

      - name: Import GPG key
        id: import_gpg
        if: ${{ env.GPG_PRIVATE_KEY != '' }}
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Compute GoReleaser flags
        id: flags
        run: |
          args="release --clean"
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            args="$args --skip=homebrew"
          fi
          if [ -z "$GPG_KEY" ]; then
            args="$args --skip=sign"
          fi
          echo "args=$args" >> "$GITHUB_OUTPUT"
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: ${{ steps.flags.outputs.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint || '' }}

      - name: Trigger korva-ui rebuild
        if: ${{ env.KORVA_UI_TOKEN != '' }}
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.KORVA_UI_DEPLOY_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'AlcanDev',
              repo: 'korva-ui',
              workflow_id: 'ci.yml',
              ref: 'main',
            })
            core.info('korva-ui rebuild triggered')
        env:
          KORVA_UI_TOKEN: ${{ secrets.KORVA_UI_DEPLOY_TOKEN }}

  # ─── Publish vault image to GHCR ───────────────────────────────────────────
  # Runs on every release_created so the image at
  # ghcr.io/alcandev/korva-vault:vX.Y.Z is always pinned to a tag,
  # plus the moving "latest" alias. Coolify can switch from `build: .`
  # to `image: ghcr.io/alcandev/korva-vault:latest` once this lands —
  # see the commented `image:` line in docker-compose.yml.
  #
  # Scanned by Trivy first (same rules as the PR job in ci.yml). A bad
  # image fails the release pipeline before publish, so the `:latest`
  # tag never moves to something Trivy considers unsafe.
  publish-image:
    name: Publish vault image to GHCR
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # for OIDC-based image signing if added later

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # ldflags need git describe

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/alcandev/korva-vault
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build image (load locally for scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: korva-vault:release-candidate
          build-args: |
            VERSION=${{ needs.release-please.outputs.tag_name }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan release candidate (HIGH/CRITICAL fixed only)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: korva-vault:release-candidate
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          vuln-type: os,library

      - name: Push (re-tag + multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.release-please.outputs.tag_name }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
