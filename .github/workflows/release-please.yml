name: Release Please

# release-please tracks conventional commits since the last tag and maintains
# a "chore(release): vX.Y.Z" PR on main. Merging that PR creates the tag
# and publishes a GitHub Release. The goreleaser job below runs immediately
# after, conditioned on release_created — no separate workflow needed.
#
# Version bump rules (conventional commits):
#   feat:      → minor bump  (v1.1.0 → v1.2.0)
#   fix:       → patch bump  (v1.1.0 → v1.1.1)
#   feat!: or BREAKING CHANGE: → major bump  (v1.1.0 → v2.0.0)
#   chore/docs/ci/refactor:    → no bump (included in next release)

on:
  push:
    branches:
      - main

permissions:
  contents: write       # create tags, upload release assets, update manifest
  pull-requests: write  # open/update Release PR
  packages: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest

    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name:        ${{ steps.rp.outputs.tag_name }}

    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  goreleaser:
    name: GoReleaser
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: beacon/package-lock.json

      - name: Build Beacon (embedded UI)
        run: |
          cd beacon && npm ci && npm run build && cd ..
          mkdir -p vault/internal/ui/dist
          cp -r beacon/dist/. vault/internal/ui/dist/

      - name: Import GPG key
        id: import_gpg
        if: ${{ env.GPG_PRIVATE_KEY != '' }}
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Compute GoReleaser flags
        id: flags
        run: |
          args="release --clean"
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            args="$args --skip=homebrew"
          fi
          if [ -z "$GPG_KEY" ]; then
            args="$args --skip=sign"
          fi
          echo "args=$args" >> "$GITHUB_OUTPUT"
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: ${{ steps.flags.outputs.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint || '' }}

      - name: Trigger korva-ui rebuild
        if: ${{ env.KORVA_UI_TOKEN != '' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.KORVA_UI_DEPLOY_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'AlcanDev',
              repo: 'korva-ui',
              workflow_id: 'ci.yml',
              ref: 'main',
            })
            core.info('korva-ui rebuild triggered')
        env:
          KORVA_UI_TOKEN: ${{ secrets.KORVA_UI_DEPLOY_TOKEN }}
