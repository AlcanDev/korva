name: Release

# release-please publishes GitHub Releases using GITHUB_TOKEN. GitHub does NOT
# fire the `push: tags` event for actions that use GITHUB_TOKEN, so we listen
# to `release: types: [published]` instead — that fires reliably in both cases.
# workflow_dispatch remains available for manual re-runs.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.1.0) — leave empty to use the current ref"
        required: false
        default: ""

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: beacon/package-lock.json

      # Build the Beacon SPA and copy it into the vault embed path so
      # GoReleaser can compile korva-vault with -tags embedui and have a
      # self-contained binary that serves the dashboard on :7437.
      - name: Build Beacon (embedded UI)
        run: |
          cd beacon
          npm ci
          npm run build
          cd ..
          mkdir -p vault/internal/ui/dist
          cp -r beacon/dist/. vault/internal/ui/dist/

      # GPG signing is optional. Set GPG_PRIVATE_KEY + GPG_PASSPHRASE secrets
      # to enable signed checksums. Skipped gracefully when not configured.
      - name: Import GPG key
        id: import_gpg
        if: ${{ env.GPG_PRIVATE_KEY != '' }}
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      # Determine which GoReleaser steps to skip based on which secrets exist.
      # GPG signing and Homebrew tap publishing are both optional — the release
      # still ships binaries and a GitHub Release without them.
      - name: Compute GoReleaser flags
        id: flags
        run: |
          args="release --clean"
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            args="$args --skip=homebrew"
          fi
          if [ -z "$GPG_KEY" ]; then
            args="$args --skip=sign"
          fi
          echo "args=$args" >> "$GITHUB_OUTPUT"
          echo "Resolved args: $args"
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: ${{ steps.flags.outputs.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint || '' }}

      # Trigger a korva-ui rebuild so the published docs site reflects the new
      # release version immediately. Requires KORVA_UI_DEPLOY_TOKEN secret:
      # a fine-grained PAT with Actions: write scope on the AlcanDev/korva-ui repo.
      - name: Trigger korva-ui rebuild
        if: ${{ env.KORVA_UI_TOKEN != '' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.KORVA_UI_DEPLOY_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'AlcanDev',
              repo: 'korva-ui',
              workflow_id: 'ci.yml',
              ref: 'main',
            })
            core.info('korva-ui rebuild triggered')
        env:
          KORVA_UI_TOKEN: ${{ secrets.KORVA_UI_DEPLOY_TOKEN }}
