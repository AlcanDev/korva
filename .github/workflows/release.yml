name: Release

# Triggered automatically when release-please creates a vX.Y.Z tag.
# Also triggered if you push a tag manually: git tag v1.2.3 && git push --tags
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  # ─── Wait for CI to be green on the tagged commit ───────────────────────────
  # The release job only starts once all CI checks on the same SHA pass.
  # This prevents shipping a broken release if tests were flaky on main.
  wait-ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Check CI status on tagged commit
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "Go build + test (ubuntu-latest, 1.26.x)"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 20
          allowed-conclusions: success,skipped

  # ─── Build & publish release ─────────────────────────────────────────────────
  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    needs: wait-ci

    steps:
      - name: Checkout (full history for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: beacon/package-lock.json

      # Build the Beacon SPA and copy it into the vault embed path so
      # GoReleaser can compile korva-vault with -tags embedui and have a
      # self-contained binary that serves the dashboard on :7437.
      - name: Build Beacon (embedded UI)
        run: |
          cd beacon
          npm ci
          npm run build
          cd ..
          mkdir -p vault/internal/ui/dist
          cp -r beacon/dist/. vault/internal/ui/dist/

      # GPG signing is optional. Set GPG_PRIVATE_KEY + GPG_PASSPHRASE secrets
      # to enable signed checksums. Skipped gracefully when not configured.
      - name: Import GPG key
        id: import_gpg
        if: ${{ env.GPG_PRIVATE_KEY != '' }}
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      # Determine which GoReleaser steps to skip based on which secrets exist.
      # GPG signing and Homebrew tap publishing are both optional — the release
      # still ships binaries and a GitHub Release without them.
      - name: Compute GoReleaser flags
        id: flags
        env:
          HAS_GPG: ${{ secrets.GPG_PRIVATE_KEY != '' }}
          HAS_BREW: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN != '' }}
        run: |
          args="release --clean"
          if [ "$HAS_GPG" != "true" ]; then
            args="$args --skip=sign"
          fi
          if [ "$HAS_BREW" != "true" ]; then
            args="$args --skip=homebrew"
          fi
          echo "args=$args" >> "$GITHUB_OUTPUT"
          echo "Resolved args: $args"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: ${{ steps.flags.outputs.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint || '' }}
