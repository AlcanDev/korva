name: Release (manual)

# Manual re-run only. GoReleaser now runs automatically inside
# release-please.yml conditioned on release_created == 'true'.
# Use this only to re-run GoReleaser for an existing tag.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3)"
        required: true
        default: ""

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for changelog)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: beacon/package-lock.json

      - name: Build Beacon (embedded UI)
        run: |
          cd beacon && npm ci && npm run build && cd ..
          mkdir -p vault/internal/ui/dist
          cp -r beacon/dist/. vault/internal/ui/dist/

      - name: Import GPG key
        id: import_gpg
        if: ${{ env.GPG_PRIVATE_KEY != '' }}
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Compute GoReleaser flags
        id: flags
        run: |
          args="release --clean"
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            args="$args --skip=homebrew"
          fi
          if [ -z "$GPG_KEY" ]; then
            args="$args --skip=sign"
          fi
          echo "args=$args" >> "$GITHUB_OUTPUT"
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: ${{ steps.flags.outputs.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint || '' }}
